<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ملخص علوم ١ 🔬</title>
<style>body,*{font-family:Tajawal,"Segoe UI",Arial,Tahoma,sans-serif}</style>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" onerror="void(0)">
<style>
:root{
  --sky:#e0f4ff;--ocean:#0077b6;--ocean2:#023e8a;
  --sun:#ffb703;--sun2:#fb8500;--green:#2dc653;
  --purple:#7b2d8b;--pink:#e91e8c;--coral:#ff6b6b;
  --card:#fff;--text:#1a1a2e;--muted:#6c7a9c;
  --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Tajawal',sans-serif;background:var(--sky);color:var(--text);direction:rtl;display:flex;flex-direction:column;height:100vh;}

/* ══ CLOUDS BG ══ */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 30% at 50% 0%,#c8e6ff 0%,transparent 60%),
    radial-gradient(ellipse 40% 20% at 10% 15%,rgba(255,255,255,.8),transparent 50%),
    radial-gradient(ellipse 35% 20% at 85% 10%,rgba(255,255,255,.7),transparent 50%);
  pointer-events:none;z-index:0;
}

/* SCREENS */
.screen{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:120px;position:relative;z-index:1;}
.screen.active{display:block;}
.screen::-webkit-scrollbar{width:4px;}
.screen::-webkit-scrollbar-thumb{background:#b0d0ef;border-radius:4px;}

/* TAB BAR */
.tabbar{
  display:flex;background:#fff;
  border-top:3px solid #b0d4f1;
  position:fixed;bottom:0;left:0;right:0;
  z-index:9999;
  box-shadow:0 -3px 16px rgba(0,119,182,.12);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 7px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:900;gap:2px;border-top:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--ocean);border-top-color:var(--ocean);}
.tab-icon{font-size:22px;}

/* ══ HOME ══ */
.home-hero{
  background:linear-gradient(160deg,var(--ocean2) 0%,var(--ocean) 70%,#00b4d8 100%);
  padding:24px 18px 20px;text-align:center;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'🌊';position:absolute;left:-20px;bottom:-10px;
  font-size:140px;opacity:.12;
}
.home-hero::after{
  content:'🐋';position:absolute;right:-10px;bottom:0;
  font-size:80px;opacity:.2;
}
.hero-fish{font-size:48px;animation:swim 3s ease-in-out infinite;display:inline-block;margin-bottom:8px;}
@keyframes swim{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-8px) rotate(3deg);}}
.hero-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.hero-grade{font-size:14px;color:rgba(255,255,255,.8);background:rgba(255,255,255,.15);display:inline-block;padding:4px 16px;border-radius:99px;margin-top:6px;}
.hero-teacher{font-size:15px;font-weight:900;color:#fff;background:rgba(255,255,255,.2);display:inline-block;padding:6px 18px;border-radius:99px;margin-top:8px;border:2px solid rgba(255,255,255,.4);letter-spacing:.5px;}

/* PROGRESS CARD */
.prog-card{
  margin:14px 16px 0;
  background:#fff;border-radius:var(--r);
  padding:14px;box-shadow:0 4px 16px rgba(0,119,182,.1);
  border:2px solid #bee3f8;
}
.pc-title{font-size:13px;font-weight:900;color:var(--ocean);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.pc-bar-wrap{background:#e8f4fd;border-radius:99px;height:12px;overflow:hidden;margin-bottom:6px;}
.pc-bar{height:12px;border-radius:99px;background:linear-gradient(90deg,var(--sun),var(--coral),var(--pink));transition:width .6s;}
.pc-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);}
.pc-row span{color:var(--ocean);}

/* CHAPTER CARDS */
.chapters{padding:0 16px 4px;}
.ch-title{font-size:13px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 10px;display:flex;align-items:center;gap:6px;}
.chap-card{
  border-radius:var(--r);padding:16px;margin-bottom:12px;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
  animation:bounceIn .4s ease both;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
@keyframes bounceIn{from{opacity:0;transform:translateY(15px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.chap-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.15);}
.chap-card:active{transform:scale(.97);}
.cc-emoji{font-size:52px;float:left;margin-right:12px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.15));}
.cc-info{overflow:hidden;}
.cc-name{font-size:16px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.2);}
.cc-lessons{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px;}
.cc-prog{background:rgba(255,255,255,.25);border-radius:99px;height:6px;overflow:hidden;margin-top:8px;}
.cc-prog-fill{height:6px;background:rgba(255,255,255,.9);border-radius:99px;transition:width .5s;}
.cc-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(255,255,255,.25);border-radius:99px;
  padding:3px 10px;font-size:10px;font-weight:900;color:#fff;
}

/* ══ LESSON LIST ══ */
.lesson-hdr{
  padding:16px 16px 12px;
  position:sticky;top:0;z-index:50;
  border-bottom:2px solid #e8f4fd;
  background:var(--sky);
}
.lh-back{background:none;border:none;color:var(--ocean);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:8px;}
.lh-chap{font-size:18px;font-weight:900;}
.lh-prog-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.lh-bar{flex:1;background:#bee3f8;border-radius:99px;height:8px;overflow:hidden;}
.lh-fill{height:8px;border-radius:99px;transition:width .5s;}
.lh-pct{font-size:12px;font-weight:900;}

.lessons-list{padding:12px 16px;}
.lesson-row{
  background:#fff;border-radius:14px;padding:13px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 2px 10px rgba(0,119,182,.07);
  border:2px solid transparent;
  animation:bounceIn .25s ease both;
}
.lesson-row:hover{border-color:#bee3f8;transform:translateX(-3px);}
.lesson-row.done{border-color:#b7f5c8;background:#f0fdf4;}
.lr-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;border:2px solid #bee3f8;color:var(--muted);transition:all .2s;}
.lesson-row.done .lr-num{background:var(--green);border-color:var(--green);color:#fff;}
.lr-info{flex:1;}
.lr-title{font-size:14px;font-weight:900;}
.lr-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.lr-arr{font-size:18px;color:#bee3f8;}

/* ══ LESSON VIEWER ══ */
.lviewer{display:none;position:fixed;inset:0;z-index:300;background:var(--sky);overflow-y:auto;flex-direction:column;}
.lviewer.open{display:flex;}
.lv-top{
  display:flex;align-items:center;gap:8px;
  padding:12px 14px;background:#fff;
  border-bottom:2px solid #bee3f8;
  position:sticky;top:0;z-index:10;flex-shrink:0;
  box-shadow:0 2px 10px rgba(0,119,182,.08);
}
.lv-back{background:var(--sky);border:2px solid #bee3f8;color:var(--ocean);border-radius:10px;padding:7px 14px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:900;cursor:pointer;}
.lv-title{font-size:14px;font-weight:900;flex:1;text-align:center;color:var(--text);}
.lv-done-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:900;cursor:pointer;}
.lv-progbar{height:5px;background:#bee3f8;flex-shrink:0;}
.lv-progfill{height:5px;transition:width .3s;}

.lv-body{padding:16px 16px 140px;flex:1;}

/* Lesson title banner */
.lesson-banner{
  border-radius:var(--r);padding:20px;text-align:center;
  margin-bottom:16px;position:relative;overflow:hidden;
}
.lb-emoji{font-size:60px;display:block;margin-bottom:8px;animation:wiggle 2s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.lb-title{font-size:22px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.lb-subtitle{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px;}

/* Content blocks */
.blk{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,119,182,.07);}
.blk-title{font-size:13px;font-weight:900;color:var(--ocean);margin-bottom:8px;display:flex;align-items:center;gap:6px;border-bottom:2px dashed #bee3f8;padding-bottom:6px;}
.blk-text{font-size:14px;line-height:2;color:#334155;}
.blk-list{list-style:none;}
.blk-list li{font-size:13px;line-height:1.9;color:#334155;padding-right:28px;position:relative;margin-bottom:4px;}
.blk-list li::before{content:'⭐';position:absolute;right:0;font-size:14px;top:2px;}
.blk-list.nums li::before{content:none;}
.blk-list.nums{counter-reset:n;}
.blk-list.nums li{padding-right:32px;counter-increment:n;}
.blk-list.nums li::after{content:counter(n);position:absolute;right:0;top:2px;width:22px;height:22px;background:var(--ocean);color:#fff;border-radius:50%;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1;}

/* Illustrated info box */
.info-ill{
  border-radius:14px;padding:14px;margin-bottom:12px;
  display:flex;gap:12px;align-items:flex-start;
  border:2px dashed;
}
.ii-icon{font-size:32px;flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.ii-content{}
.ii-title{font-size:13px;font-weight:900;margin-bottom:5px;}
.ii-text{font-size:13px;line-height:1.8;color:#334155;}

/* SVG illustrations */
.svg-wrap{text-align:center;margin:10px 0;}
.svg-wrap svg{max-width:100%;border-radius:14px;}

/* QA block */
.qa-block{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:2px solid #7dd3fc;border-radius:14px;padding:14px;margin-bottom:10px;}
.qa-q{font-size:14px;font-weight:900;color:var(--ocean2);margin-bottom:6px;display:flex;gap:8px;}
.qa-q-badge{background:var(--ocean);color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:900;flex-shrink:0;}
.qa-a{font-size:13px;line-height:1.9;color:#334155;padding-right:12px;border-right:3px solid #7dd3fc;}

/* Highlight box */
.highlight{background:linear-gradient(135deg,#fff9c4,#fef08a);border:2px solid #fbbf24;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;}
.hl-icon{font-size:20px;flex-shrink:0;}
.hl-text{font-size:13px;font-weight:700;color:#78350f;line-height:1.8;}

/* Nav buttons */
.nav-btns{display:flex;gap:8px;margin-top:16px;}
.nav-prev{flex:1;background:#fff;border:2px solid #bee3f8;color:var(--muted);border-radius:12px;padding:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.nav-next{flex:2;background:linear-gradient(135deg,var(--ocean),var(--ocean2));color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(0,119,182,.3);}

/* ══ QUIZ ══ */
.quiz-hero{background:linear-gradient(135deg,#7b2d8b,#e91e8c);padding:20px 18px;text-align:center;position:relative;overflow:hidden;}
.quiz-hero::before{content:'🧠';position:absolute;left:-10px;bottom:-5px;font-size:100px;opacity:.1;}
.qh-emoji{font-size:44px;animation:bounce 1s ease-in-out infinite;display:inline-block;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.qh-title{font-size:20px;font-weight:900;color:#fff;margin-top:4px;}
.qh-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px;}

.q-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px 0;}
.qs{background:#fff;border-radius:12px;padding:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.qs-num{font-size:22px;font-weight:900;}
.qs-lbl{font-size:10px;color:var(--muted);}

.q-card{background:#fff;border-radius:var(--r);margin:12px 16px 0;padding:16px;box-shadow:0 4px 18px rgba(0,0,0,.08);}
.qc-num{font-size:11px;font-weight:900;color:var(--purple);margin-bottom:6px;}
.qc-q{font-size:15px;font-weight:700;line-height:1.7;margin-bottom:12px;}
.qc-opts{display:flex;flex-direction:column;gap:8px;}
.qc-opt{background:#f8faff;border:2px solid #bee3f8;border-radius:12px;padding:12px 14px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:right;transition:all .2s;color:var(--text);}
.qc-opt:hover{border-color:var(--ocean);background:#e0f2fe;}
.qc-opt.correct{background:#f0fdf4;border-color:var(--green);color:#166534;}
.qc-opt.wrong{background:#fef2f2;border-color:#f87171;color:#991b1b;}
.qc-opt.dis{cursor:default;pointer-events:none;}
.qc-result{display:none;margin-top:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:700;line-height:1.7;}
.qc-result.ok{background:#f0fdf4;color:#166534;border:2px solid #86efac;}
.qc-result.no{background:#fef2f2;color:#991b1b;border:2px solid #fca5a5;}
.next-q{display:block;width:calc(100%-32px);margin:10px 16px 0;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(123,45,139,.3);}
.stars-row{display:flex;justify-content:center;gap:4px;font-size:20px;margin-top:6px;}

/* DONE POPUP */
.done-pop{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;}
.done-pop.show{display:flex;}
.done-box{background:#fff;border-radius:24px;padding:28px 22px;text-align:center;max-width:290px;width:90%;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.dp-emoji{font-size:64px;display:block;margin-bottom:8px;}
.dp-title{font-size:22px;font-weight:900;color:var(--ocean);margin-bottom:6px;}
.dp-sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7;}
.dp-btn{width:100%;background:linear-gradient(135deg,var(--ocean),var(--ocean2));color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:900;cursor:pointer;}
.dp-btn2{width:100%;background:none;border:2px solid #bee3f8;color:var(--muted);border-radius:14px;padding:12px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="scHome">
  <div class="home-hero">
    <span class="hero-fish">🐠</span>
    <div class="hero-title">ملخص علوم ١</div>
    <div class="hero-grade">📅 عام 2026 🔬</div>
    <div class="hero-teacher">👩‍🏫 معلمة المادة: فاطمة بشار</div>
  </div>

  <div class="prog-card">
    <div class="pc-title">⭐ تقدمي في المادة</div>
    <div class="pc-bar-wrap"><div class="pc-bar" id="progBar" style="width:0%"></div></div>
    <div class="pc-row">درست <span id="doneCount">0</span> من <span id="totalCount">0</span> موضوع <span id="progPct" style="color:var(--coral)">0%</span></div>
  </div>

  <div class="chapters">
    <div class="ch-title">📚 الوحدات الدراسية</div>
    <div id="chapsList"></div>
  </div>
</div>

<!-- LESSONS LIST -->
<div class="screen" id="scLessons">
  <div class="lesson-hdr">
    <button class="lh-back" onclick="closeChap()">← رجوع</button>
    <div class="lh-chap" id="chapTitle"></div>
    <div class="lh-prog-row">
      <div class="lh-bar"><div class="lh-fill" id="chapProgFill" style="width:0%"></div></div>
      <span class="lh-pct" id="chapProgPct">0%</span>
    </div>
  </div>
  <div class="lessons-list" id="lessonsList"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="scQuiz">
  <div class="quiz-hero">
    <span class="qh-emoji">🧠</span>
    <div class="qh-title">أسئلة مراجعة</div>
    <div class="qh-sub">اختبر معلوماتك وكسب نجوم ⭐</div>
  </div>
  <div class="q-stats">
    <div class="qs"><div class="qs-num" style="color:var(--ocean)" id="qCurr">1</div><div class="qs-lbl">السؤال</div></div>
    <div class="qs"><div class="qs-num" style="color:var(--green)" id="qScore">0</div><div class="qs-lbl">✅ صح</div></div>
    <div class="qs"><div class="qs-num" style="color:var(--coral)" id="qWrong">0</div><div class="qs-lbl">❌ غلط</div></div>
  </div>
  <div id="quizContent"></div>
  <button class="next-q" id="nextQBtn" onclick="nextQ()" style="display:none">السؤال التالي ←</button>
</div>

<!-- LESSON VIEWER -->
<div class="lviewer" id="lviewer">
  <div class="lv-top">
    <button class="lv-back" onclick="closeLesson()">← رجوع</button>
    <div class="lv-title" id="lvTitle"></div>
    <button class="lv-done-btn" id="lvDoneBtn" onclick="markDone()">✅ فهمت!</button>
  </div>
  <div class="lv-progbar"><div class="lv-progfill" id="lvProgFill" style="width:0%"></div></div>
  <div class="lv-body" id="lvBody"></div>
</div>

<!-- DONE POPUP -->
<div class="done-pop" id="donePop">
  <div class="done-box">
    <span class="dp-emoji" id="dpEmoji">🎉</span>
    <div class="dp-title" id="dpTitle">رائع!</div>
    <div class="dp-sub" id="dpSub"></div>
    <div class="stars-row" id="dpStars">⭐⭐⭐</div>
    <button class="dp-btn" id="dpBtn" onclick="closeDone()">الدرس التالي ←</button>
    <button class="dp-btn2" onclick="closeDone()">ارجع للقائمة</button>
  </div>
</div>

<!-- TABS -->
<div class="tabbar">
  <div class="tab active" id="tabHome" onclick="switchTab('Home')"><span class="tab-icon" style="font-size:20px">⌂</span><span>الرئيسية</span></div>
  <div class="tab" id="tabQuiz" onclick="switchTab('Quiz')"><span class="tab-icon" style="font-size:20px">✎</span><span>مراجعة</span></div>
</div>

<script>
// ══════════════════════════════════════
//  CURRICULUM DATA
// ══════════════════════════════════════
const CURRICULUM = [
{
  id:'c1', name:'سطح الأرض والمسطحات المائية', emoji:'🌍',
  bg:'linear-gradient(135deg,#0077b6,#00b4d8)', accent:'#0077b6',
  lessons:[
    {id:'l1', emoji:'🌊', title:'تركيب سطح الأرض',
     banner:{bg:'linear-gradient(135deg,#023e8a,#0077b6)', subtitle:'اليابسة والماء'},
     content:[
      {type:'text', title:'🌍 كيف يبدو كوكبنا؟',
       text:'يتكون سطح الأرض من اليابسة والماء. يشكل الماء نسبة 71% ، أما المساحة الباقية فهي القارات واليابسة!'},
      {type:'svg_earth'},
      {type:'highlight', icon:'💡', text:'الماء يغطي أكثر من ثلثي سطح الأرض! ولهذا يبدو كوكبنا أزرق اللون من الفضاء 🚀'},
     ]
    },
    {id:'l2', emoji:'🌊', title:'أنواع البحار الثلاثة',

};

// ══════════════════════════════════════
//  QUIZ QUESTIONS
// ══════════════════════════════════════
const QUESTIONS = [
  {q:'كم نسبة الماء على سطح الأرض؟', opts:['50%','60%','71%','80%'], c:2, exp:'يشكل الماء نسبة 71% من سطح الأرض! ولهذا يبدو كوكبنا أزرق من الفضاء.'},
  {q:'ما نوع البحر الذي يتصل بالمحيط مباشرة؟', opts:['البحر المغلق','البحر الداخلي','البحر الخارجي','البحر الجليدي'], c:2, exp:'البحر الخارجي هو الذي يتصل بالمحيط مباشرة.'},
  {q:'ما نوع البحر المحاط باليابسة من كل جانب؟', opts:['البحر الخارجي','البحر المغلق','البحر الداخلي','بحر التواصل'], c:1, exp:'البحر المغلق محاط باليابسة من كل جانب ولا يتصل بالمحيط.'},
  {q:'أي من هذه المحيطات هو الأكبر في العالم؟', opts:['المحيط الهندي','المحيط الأطلسي','المحيط الهادي','المحيط القطبي'], c:2, exp:'المحيط الهادي هو الأكبر والأعمق محيط في العالم!'},
  {q:'ما التقنية المستخدمة لقياس أعماق البحار بالصوت؟', opts:['الرادار','السونار','الليزر','التلسكوب'], c:1, exp:'تقنية السونار تُرسل الصوت وتستقبل صداه من قاع البحر لقياس العمق.'},
  {q:'ما المصدر الرئيسي للحرارة على سطح الأرض؟', opts:['القمر','الشمس','النجوم','باطن الأرض'], c:1, exp:'الشمس ☀️ هي المصدر الرئيسي للحرارة على سطح الأرض.'},
  {q:'ما مصدر ملوحة مياه البحار؟', opts:['المطر','أسماك البحر','أملاح صخور القشرة الأرضية','ملح الجبال'], c:2, exp:'تعمل المياه الجارية على إذابة أملاح صخور القشرة الأرضية ونقلها للبحار.'},
  {q:'ما الطاقة المتجددة؟', opts:['طاقة الفحم','طاقة النفط','طاقة الشمس','طاقة الغاز'], c:2, exp:'الطاقة الشمسية متجددة لأنها من الشمس الدائمة ولا تنفذ ولا تلوث البيئة.'},
  {q:'ما تأثير حرارة الشمس على دورة الماء؟', opts:['لا تأثير','تجميد الماء','تبخر مياه البحار','إنزال المطر مباشرة'], c:2, exp:'حرارة الشمس هي العامل الرئيسي في تبخر مياه البحار والمحيطات.'},
  {q:'ماذا نسمي ارتفاع مياه الساحل؟', opts:['الجزر','المد','الفيضان','الموجة'], c:1, exp:'ارتفاع مياه الساحل يسمى المد، وانحسارها يسمى الجزر.'},
  {q:'لماذا لا يمكن استثمار طاقة الرياح في مناطق السكن؟', opts:['لأن الرياح قوية جداً','لأن المباني تعمل كمصدات تجعل الرياح بطيئة','لأن التكلفة عالية','لأنها تلوث البيئة'], c:1, exp:'المباني تعمل كمصدات للرياح فتجعل سرعتها بطيئة وغير منتظمة.'},
  {q:'ما مصدر طاقة الأرض الجوفية؟', opts:['أشعة الشمس','الرياح','حرارة باطن الأرض','المياه الجارية'], c:2, exp:'الطاقة الجوفية مستمدة من حرارة باطن الأرض الشديدة.'},
  {q:'ما الطاقة غير المتجددة؟', opts:['طاقة الشمس','طاقة الرياح','الوقود الأحفوري','الطاقة المائية'], c:2, exp:'الوقود الأحفوري (نفط، فحم، غاز) هو الطاقة غير المتجددة لأنه ينفذ ويلوث.'},
  {q:'كيف تولّد الطاقة المائية الكهرباء؟', opts:['عبر تسخين الماء','بتدوير التوربينات بقوة الماء الجاري','عبر الأمواج فقط','بتحويل الماء لبخار'], c:1, exp:'الماء الجاري يدور على التوربينات الكبيرة التي تشغل المولدات الكهربائية.'},
  {q:'ما اليابسة من مجموع سطح الأرض؟', opts:['71%','50%','29%','40%'], c:2, exp:'اليابسة تمثل 29% فقط من سطح الأرض، بينما الماء 71%!'},
];

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let S={done:{},streak:0,lastDate:''};
let curChap=null, curLesson=null, curIdx=0;
const allL=CURRICULUM.flatMap(c=>c.lessons);
let qIdx=0, qScore=0, qWrong=0, qAnswered=false;

// Storage
const _mem={};
function load(){
  try{const r=localStorage.getItem('sci5');if(r)S=JSON.parse(r);}catch(e){}
  renderAll();
}
function save(){
  try{localStorage.setItem('sci5',JSON.stringify(S));}catch(e){_mem['sci5']=JSON.stringify(S);}
}
function isDone(id){return!!(S.done&&S.done[id]);}

// ══ TABS ══
function switchTab(n){
  ['Home','Lessons','Quiz'].forEach(x=>{const e=document.getElementById('sc'+x);if(e)e.classList.remove('active');});
  document.getElementById('sc'+n).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab'+n).classList.add('active');
  if(n==='Quiz')showQ();
}

// ══ RENDER HOME ══
function renderAll(){
  const done=allL.filter(l=>isDone(l.id)).length;
  const total=allL.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('doneCount').textContent=done;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('progPct').textContent=pct+'%';

  document.getElementById('chapsList').innerHTML=CURRICULUM.map((c,i)=>{
    const cd=c.lessons.filter(l=>isDone(l.id)).length;
    const cp=Math.round(cd/c.lessons.length*100);
    return `<div class="chap-card" onclick="openChap('${c.id}')" style="background:${c.bg};animation-delay:${i*.1}s">
      <span class="cc-emoji">${c.emoji}</span>
      <div class="cc-info">
        <div class="cc-name">${c.name}</div>
        <div class="cc-lessons">📖 ${c.lessons.length} موضوع · ${cd} مكتمل</div>
        <div class="cc-prog"><div class="cc-prog-fill" style="width:${cp}%"></div></div>
      </div>
      <span class="cc-badge">${cp===100?'✅ اكتمل':'%'+cp}</span>
    </div>`;
  }).join('');
}

// ══ CHAPTER ══
function openChap(id){
  curChap=CURRICULUM.find(c=>c.id===id);if(!curChap)return;
  const done=curChap.lessons.filter(l=>isDone(l.id)).length;
  const pct=Math.round(done/curChap.lessons.length*100);
  document.getElementById('chapTitle').textContent=curChap.emoji+' '+curChap.name;
  document.getElementById('chapProgFill').style.width=pct+'%';
  document.getElementById('chapProgFill').style.background=curChap.accent;
  document.getElementById('chapProgPct').textContent=pct+'%';
  document.getElementById('chapProgPct').style.color=curChap.accent;
  document.getElementById('lessonsList').innerHTML=curChap.lessons.map((l,i)=>`
    <div class="lesson-row ${isDone(l.id)?'done':''}" onclick="openLesson('${l.id}')" style="animation-delay:${i*.06}s">
      <div class="lr-num" style="${isDone(l.id)?'':'border-color:'+curChap.accent}">${isDone(l.id)?'✓':(i+1)}</div>
      <div class="lr-info">
        <div class="lr-title">${l.emoji} ${l.title}</div>
        <div class="lr-meta">${isDone(l.id)?'✅ انتهيت منه!':'▶️ اضغط للدراسة'}</div>
      </div>
      <div class="lr-arr">›</div>
    </div>`).join('');
  switchTab('Lessons');
}
function closeChap(){switchTab('Home');}

// ══ LESSON VIEWER ══
function openLesson(id){
  curIdx=allL.findIndex(l=>l.id===id);curLesson=allL[curIdx];if(!curLesson)return;
  renderLesson();
  document.getElementById('lviewer').classList.add('open');
  document.getElementById('lviewer').scrollTop=0;
}

function renderLesson(){
  const l=curLesson; const done=isDone(l.id);
  document.getElementById('lvTitle').textContent='موضوع '+(curIdx+1);
  const db=document.getElementById('lvDoneBtn');
  db.textContent=done?'✅ فهمته':'✅ فهمت!';
  db.style.background=done?'#059669':'#22c55e';
  document.getElementById('lvProgFill').style.width=(((curIdx+1)/allL.length)*100)+'%';
  document.getElementById('lvProgFill').style.background=curChap?curChap.accent:'#0077b6';

  let h=`<div class="lesson-banner" style="background:${l.banner.bg}">
    <span style="font-size:60px;display:block;animation:wiggle 2s ease-in-out infinite">${l.emoji}</span>
    <div class="lb-title">${l.title}</div>
    <div class="lb-subtitle">${l.banner.subtitle}</div>
  </div>`;

  l.content.forEach(b=>{
    if(b.type==='text'){
      h+=`<div class="blk"><div class="blk-title">${b.title}</div><div class="blk-text">${b.text}</div></div>`;
    }else if(b.type==='list_star'){
      h+=`<div class="blk"><div class="blk-title">${b.title}</div><ul class="blk-list">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    }else if(b.type==='list_num'){
      h+=`<div class="blk"><div class="blk-title">${b.title}</div><ul class="blk-list nums">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    }else if(b.type==='ill'){
      h+=`<div class="info-ill" style="background:${b.color};border-color:${b.borderColor}">
        <span class="ii-icon">${b.icon}</span>
        <div class="ii-content"><div class="ii-title" style="color:${b.textColor}">${b.title}</div><div class="ii-text">${b.text}</div></div>
      </div>`;
    }else if(b.type==='qa'){
      h+=`<div class="qa-block">
        <div class="qa-q"><span class="qa-q-badge">سؤال</span>${b.q}</div>
        <div class="qa-a">✏️ ${b.a}</div>
      </div>`;
    }else if(b.type==='highlight'){
      h+=`<div class="highlight"><span class="hl-icon">${b.icon}</span><div class="hl-text">${b.text}</div></div>`;
    }else if(SVGS[b.type]){
      h+=SVGS[b.type];
    }
  });

  h+=`<div class="nav-btns">
    ${curIdx>0?`<button class="nav-prev" onclick="prevL()">← السابق</button>`:''}
    <button class="nav-next" onclick="markDone()">${done?'✅ التالي ←':'✅ فهمت! التالي →'}</button>
  </div>`;
  document.getElementById('lvBody').innerHTML=h;
}

function markDone(){
  if(!S.done)S.done={};const was=isDone(curLesson.id);
  S.done[curLesson.id]=true;save();renderAll();
  if(!was){
    const cnt=allL.filter(l=>isDone(l.id)).length;
    const pct=Math.round(cnt/allL.length*100);
    document.getElementById('dpEmoji').textContent=pct===100?'🏆':cnt%3===0?'🥳':'⭐';
    document.getElementById('dpTitle').textContent=pct===100?'أنهيت الكتاب! 🎉':'أحسنت! ⭐';
    document.getElementById('dpSub').textContent=`أتممت ${cnt} من ${allL.length} موضوعاً! (${pct}%)`;
    document.getElementById('dpStars').textContent=pct>=80?'⭐⭐⭐':pct>=50?'⭐⭐':'⭐';
    document.getElementById('dpBtn').textContent=curIdx<allL.length-1?'الموضوع التالي ←':'🏠 الرئيسية';
    document.getElementById('donePop').classList.add('show');
  }else nextL();
}
function closeDone(){document.getElementById('donePop').classList.remove('show');const hn=curIdx<allL.length-1;if(hn)nextL();else closeLesson();}
function nextL(){if(curIdx<allL.length-1){curIdx++;curLesson=allL[curIdx];renderLesson();document.getElementById('lviewer').scrollTop=0;}else closeLesson();}
function prevL(){if(curIdx>0){curIdx--;curLesson=allL[curIdx];renderLesson();document.getElementById('lviewer').scrollTop=0;}}
function closeLesson(){document.getElementById('lviewer').classList.remove('open');}

// ══ QUIZ ══
function showQ(){
  const q=QUESTIONS[qIdx%QUESTIONS.length];
  document.getElementById('qCurr').textContent=(qIdx%QUESTIONS.length)+1;
  document.getElementById('qScore').textContent=qScore;
  document.getElementById('qWrong').textContent=qWrong;
  document.getElementById('nextQBtn').style.display='none';
  qAnswered=false;
  document.getElementById('quizContent').innerHTML=`
    <div class="q-card">
      <div class="qc-num">سؤال ${(qIdx%QUESTIONS.length)+1} من ${QUESTIONS.length} 🌟</div>
      <div class="qc-q">${q.q}</div>
      <div class="qc-opts">${q.opts.map((o,i)=>`<button class="qc-opt" onclick="ansQ(this,${i},${q.c},'${q.exp.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
      <div class="qc-result" id="qRes"></div>
    </div>`;
}
function playCorrectSound(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    for(let i=0;i<6;i++){
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.exp(-j/(ctx.sampleRate*0.025));
      const src=ctx.createBufferSource();src.buffer=buf;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.4,ctx.currentTime+i*0.1);
      g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+i*0.1+0.06);
      const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=1200;f.Q.value=0.5;
      src.connect(f);f.connect(g);g.connect(ctx.destination);
      src.start(ctx.currentTime+i*0.1);
    }
    [523,659,784,1047].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+0.65+i*0.12);
      g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+0.65+i*0.12+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.65+i*0.12+0.25);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+0.65+i*0.12);o.stop(ctx.currentTime+0.65+i*0.12+0.3);
    });
  }catch(e){}
}
function playWrongSound(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [300,220,180].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      o.frequency.exponentialRampToValueAtTime(freq*0.6,ctx.currentTime+i*0.18+0.2);
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.18);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.22);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.25);
    });
  }catch(e){}
}
function ansQ(btn,sel,c,exp){
  if(qAnswered)return;qAnswered=true;
  document.querySelectorAll('.qc-opt').forEach((b,i)=>{b.classList.add('dis');if(i===c)b.classList.add('correct');else if(b===btn&&sel!==c)b.classList.add('wrong');});
  const ok=sel===c;if(ok){qScore++;playCorrectSound();}else{qWrong++;playWrongSound();}
  document.getElementById('qScore').textContent=qScore;
  document.getElementById('qWrong').textContent=qWrong;
  const res=document.getElementById('qRes');
  res.style.display='block';res.className='qc-result '+(ok?'ok':'no');
  res.innerHTML=(ok?'🎉 إجابة صحيحة! ممتاز! ':'😊 إجابة خاطئة. ')+exp;
  document.getElementById('nextQBtn').style.display='block';
}
function nextQ(){
  qIdx++;
  if(qIdx>=QUESTIONS.length){
    showResult();
  } else {
    showQ();
  }
}
function showResult(){
  var pct=Math.round((qScore/QUESTIONS.length)*100);
  var stars = pct>=90?'🌟🌟🌟':pct>=70?'🌟🌟':pct>=50?'🌟':'';
  var msg = pct>=90?'ممتاز! أنت نجم العلوم ⭐':pct>=70?'جيد جداً! استمر 💪':pct>=50?'جيد، راجع المادة 📚':'راجع الدروس وحاول مجدداً 🔄';
  document.getElementById('quizContent').innerHTML=
    '<div style="text-align:center;padding:20px">'
    +'<div style="font-size:60px;margin-bottom:12px">'+stars+'</div>'
    +'<div style="font-size:28px;font-weight:900;color:#0077b6;margin-bottom:8px">'+pct+' / 100</div>'
    +'<div style="font-size:16px;color:#444;margin-bottom:6px">'+qScore+' إجابة صحيحة من '+QUESTIONS.length+'</div>'
    +'<div style="font-size:14px;color:#666;margin-bottom:20px">'+msg+'</div>'
    +'<button onclick="restartQuiz()" style="background:#0077b6;color:#fff;border:none;border-radius:14px;padding:14px 32px;font-family:Tajawal,Arial,sans-serif;font-size:16px;font-weight:900;cursor:pointer">🔄 أعد الاختبار</button>'
    +'</div>';
  document.getElementById('nextQBtn').style.display='none';
}
function restartQuiz(){
  qIdx=0;qScore=0;qWrong=0;qAnswered=false;
  document.getElementById('qScore').textContent='0';
  document.getElementById('qWrong').textContent='0';
  showQ();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',load);
}else{
  setTimeout(load,100);
}
</script>
</body>
</html>
